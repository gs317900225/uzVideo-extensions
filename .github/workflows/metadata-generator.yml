name: Metadata JSON Generator

on:
  push:

jobs:
  generate-metadata:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # зЎ®дҝқ GITHUB_TOKEN е…·жңүеҶҷе…Ҙжқғйҷҗ

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # иҺ·еҸ–е®Ңж•ҙзҡ?Git еҺҶеҸІпјҢйҒҝе…?push еӨұиҙҘ

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Generate Metadata
      run: |
        node action/parse-metadata.cjs

    - name: Commit changes
      run: |
        git config --global user.name 'GitHub Action'
        git config --global user.email 'action@github.com'
        git add *.json
        git add *.zip
        git commit -m 'иҜҘж–Үд»¶иҮӘеҠЁз”ҹжҲҗпјҢж— йңҖжүӢеҠЁдҝ®ж”№гҖ? || echo 'No changes to commit'
        git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git


